<!DOCTYPE html>
<html>
<head>
    <title>eBay Auth Helper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 8px;
        }
        h1 {
            color: #333;
        }
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
        button {
            background: #0066cc;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0052a3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .instructions {
            background: #fff3cd;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>eBay OAuth Helper</h1>

        <div class="instructions">
            <strong>Instructions:</strong>
            <ol>
                <li>Click "Connect to eBay" in your app</li>
                <li>Complete authorization on eBay</li>
                <li>Copy the ENTIRE callback URL from your browser address bar</li>
                <li>Paste it in the box below</li>
                <li>Click "Extract Code and Authenticate"</li>
            </ol>
        </div>

        <label for="callbackUrl"><strong>Paste the callback URL here:</strong></label>
        <textarea id="callbackUrl" rows="3" placeholder="https://listing-agent-ebay.loca.lt/ebay/callback?code=v%5E1.1%23...&expires_in=299"></textarea>

        <button onclick="processCallback()">Extract Code and Authenticate</button>

        <div id="result"></div>
    </div>

    <script>
        async function processCallback() {
            const resultDiv = document.getElementById('result');
            const url = document.getElementById('callbackUrl').value.trim();

            if (!url) {
                resultDiv.innerHTML = '<div class="result error">Please paste the callback URL</div>';
                return;
            }

            try {
                // Extract code parameter from URL
                const urlObj = new URL(url);
                const code = urlObj.searchParams.get('code');

                if (!code) {
                    resultDiv.innerHTML = '<div class="result error">Could not find "code" parameter in URL</div>';
                    return;
                }

                resultDiv.innerHTML = '<div class="result">Authenticating with eBay...</div>';

                // Send POST request to backend
                const response = await fetch('http://localhost:8000/api/ebay/auth/callback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `code=${encodeURIComponent(code)}`
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <strong>✓ Authentication Successful!</strong><br>
                            User ID: ${data.user_id}<br>
                            Token expires: ${data.token_expires_at}<br><br>
                            You can now close this window and use the app.
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <strong>✗ Authentication Failed</strong><br>
                            ${data.detail || 'Unknown error'}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>✗ Error:</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
